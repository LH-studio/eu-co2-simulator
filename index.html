<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#059669">
  <meta name="description" content="Interaktiver CO₂-Emissionsvergleich europäischer Länder">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CO₂ Explorer">
  <title>EU CO₂ Explorer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Loading state visible immediately (no JS needed) -->
  <div id="loading" style="
    font-family: 'Outfit', system-ui, sans-serif;
    background: #f6f9f7;
    color: #5a8070;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  ">
    <div>
      <div style="font-size:40px;margin-bottom:12px">🌍</div>
      <div style="font-weight:600">Lade Kartendaten…</div>
    </div>
  </div>

  <!-- App shell (hidden until JS shows it) -->
  <div id="app" style="display:none"></div>

  <!-- Error display (hidden) -->
  <div id="error" style="
    display:none;
    font-family: 'Outfit', system-ui, sans-serif;
    background: #f6f9f7;
    color: #b44;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    text-align: center;
  ">
    <div>
      <div style="font-size:32px;margin-bottom:8px">⚠️</div>
      <div id="error-msg">Fehler beim Laden</div>
    </div>
  </div>

  <!--
    STEP 1: Clean up old service workers.
    This runs BEFORE any other script to fix stale-cache issues.
  -->
  <script>
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      }
    })();
  </script>

  <!-- STEP 2: Load d3-geo -->
  <script src="https://cdn.jsdelivr.net/npm/d3-geo@3/dist/d3-geo.min.js"></script>

  <!-- STEP 3: App code -->
  <script src="js/app.js"></script>

  <!-- STEP 4: Re-register SW (after app loaded) -->
  <script>
    window.addEventListener('load', function() {
      if ('serviceWorker' in navigator) {
        setTimeout(function() {
          navigator.serviceWorker.register('sw.js').catch(function() {});
        }, 3000);
      }
    });
  </script>

</body>
</html>
